<html>
    <head>
        <title>Javascript Sederhana</title>
        <script src="main.js"></script>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <h2>Cek Nilai Huruf</h2>
            
        </header>
        <div class="content">
            <section class="contain">
            <h2>Masukan Data untuk mengubah Nilai menjadi indeks huruf</h2>
            <label for="npm">NPM :</label>
            <input type="text" id="npm" name="npm" placeholder="Masukan NPM"><br>
            <label for="mk">Mata Kuliah :</label>
            <input type="text" id="mk" name="mk" placeholder="Masukan Nama MK">
            <label for="nilai">Nilai :</label>
            <input type="number" id="nilai" name="nilai" placeholder="Masukan Nilai anda"><br>
            <button class="btn" onclick="ubahHuruf()">Huruf nilai</button><br>
            <h1>Hasil :</h1>
            <p id="hasil"></p>
            </section>
        </div>
    </body>
</html>
